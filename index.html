<!DOCTYPE html>
<html>
<head>
  <title>Mastayers Leaderboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 8px; border-bottom: 1px solid #ddd; }
  </style>
</head>
<body>

<h1>Mastayers Fantasy Leaderboard</h1>
<p>Auto-updates every 10 minutes</p>

<table id="leaderboard">
  <thead>
    <tr>
      <th>Team</th>
      <th>Player</th>
      <th>Score</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function loadLeaderboard() {
  const res = await fetch('data/fantasy.json');
  const obj = await res.json();

  // Convert object → array
  let teams = Object.entries(obj).map(([teamName, info]) => ({
    team: teamName,
    total: info.total
  }));

  // Sort by total DESC
  teams.sort((a, b) => b.total - a.total);

  const tbody = document.querySelector('#leaderboard tbody');
  tbody.innerHTML = '';

  teams.forEach(row => {
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td><a href="team.html?team=${encodeURIComponent(row.team)}">${row.team}</a></td>
      <td>${row.total}</td>
    `;

    tbody.appendChild(tr);
  });
}

loadLeaderboard();
</script>

</body>
</html>
