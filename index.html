<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mastayers 2026 Leaderboard</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 5px;
    }

    #lastUpdated {
        text-align: center;
        font-style: italic;
        color: #555;
        margin-bottom: 20px;
    }

    /* TEAM ROW */
    .team {
        background: white;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid #ddd;
    }

    .team:hover {
        background: #f0f0f0;
    }

    .team-name {
        font-size: 22px;
        font-weight: 700;
        cursor: pointer;
    }

    .team-total {
        float: right;
        font-size: 20px;
        font-weight: bold;
    }

    /* ROUND ROW */
    .round {
        background: #ffffff;
        border-left: 8px solid #0b6623; /* Masters green */
        border-right: 2px solid #0b6623;
        border-bottom: 2px solid #0b6623;
        padding: 10px 14px;
        margin: 6px 0;
        cursor: pointer;
        font-size: 18px;
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* COLLAPSIBLE (NO SLIDE) */
    .collapsible {
        display: none;
        padding-left: 20px;
    }

    /* TABLE WRAPPER */
    .table-wrapper {
        overflow-x: auto;
        margin-top: 10px;
    }

    /* SCORE TABLE */
    table {
        width: 100%;
        border-collapse: collapse;
        min-width: 900px;
        margin-bottom: 12px;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 6px;
        text-align: center;
    }

    th {
        background: #eee;
        font-weight: 700;
    }

    .player-name {
        background: #f0f0f0;
        font-weight: 700;
    }

    .team-total-row {
        background: #e8f5e9;
        font-weight: 700;
    }

    /* ARROWS */
    .arrow {
        display: inline-block;
        transition: transform 0.2s ease;
        margin-right: 6px;
        font-size: 14px;
    }

    .expanded {
        transform: rotate(90deg);
    }
</style>
</head>

<body>
<div style="text-align:center; margin-bottom:10px;">
    <img src="Mastayers.png" alt="Mastayers Logo" 
         style="max-width:180px; height:auto;">
</div>
<h1>Mastayers 2026 Leaderboard</h1>
<p id="lastUpdated"></p>

<div id="leaderboard"></div>

<script>
/* ---------------- LAST UPDATED ---------------- */
async function loadLastUpdated() {
    const res = await fetch(
        "https://api.github.com/repos/brewingtb/Mastayers26/commits?path=data/fantasy.json"
    );
    const commits = await res.json();

    if (commits.length > 0) {
        const timestamp = commits[0].commit.committer.date;
        const date = new Date(timestamp);

        document.getElementById("lastUpdated").textContent =
            "Last updated: " +
            date.toLocaleString("en-US", {
                weekday: "short",
                month: "short",
                day: "numeric",
                hour: "numeric",
                minute: "2-digit",
                hour12: true
            });
    }
}

/* ---------------- LOAD DATA ---------------- */
async function loadData() {
    const fantasyRes = await fetch("data/fantasy.json");
    const fantasy = await fantasyRes.json();

    const scoresRes = await fetch("data/scores.json");
    const scores = await scoresRes.json();

    const teamPlayersRes = await fetch("data/team_players_fixed.json");
    const teamPlayers = await teamPlayersRes.json();

    renderLeaderboard(fantasy, scores, teamPlayers);
}

/* ---------------- RENDER LEADERBOARD ---------------- */
function renderLeaderboard(fantasy, scores, teamPlayers) {
    const container = document.getElementById("leaderboard");
    container.innerHTML = "";

    const teams = Object.entries(fantasy)
        .map(([teamName, data]) => ({
            teamName,
            total: data.total
        }))
        .sort((a, b) => b.total - a.total);

    teams.forEach(team => {
        const playerIds = teamPlayers[team.teamName] || [];

        /* TEAM ROW */
        const teamDiv = document.createElement("div");
        teamDiv.className = "team";
        teamDiv.innerHTML = `
            <span class="team-name">
                <span class="arrow">▶</span> ${team.teamName}
            </span>
            <span class="team-total">${team.total}</span>
        `;

        /* TEAM COLLAPSIBLE */
        const roundsContainer = document.createElement("div");
        roundsContainer.className = "collapsible";

        /* BUILD 4 ROUNDS */
        for (let r = 1; r <= 4; r++) {
            const roundTotal = computeTeamRoundTotal(playerIds, scores, r);

            const roundDiv = document.createElement("div");
            roundDiv.className = "round";
            roundDiv.innerHTML = `
                <span><span class="arrow">▶</span> Round ${r}</span>
                <span>${roundTotal}</span>
            `;

            const roundContent = document.createElement("div");
            roundContent.className = "collapsible";

            roundDiv.addEventListener("click", (e) => {
                e.stopPropagation();

                if (roundContent.innerHTML.trim() === "") {
                    roundContent.appendChild(
                        buildRoundTable(playerIds, scores, r)
                    );
                }

                roundContent.style.display =
                    roundContent.style.display === "block" ? "none" : "block";

                const arrow = roundDiv.querySelector(".arrow");
                arrow.classList.toggle("expanded");
            });

            roundsContainer.appendChild(roundDiv);
            roundsContainer.appendChild(roundContent);
        }

        /* TEAM CLICK */
        teamDiv.addEventListener("click", () => {
            roundsContainer.style.display =
                roundsContainer.style.display === "block" ? "none" : "block";

            const arrow = teamDiv.querySelector(".team-name .arrow");
            arrow.classList.toggle("expanded");
        });

        container.appendChild(teamDiv);
        container.appendChild(roundsContainer);
    });
}

/* ---------------- COMPUTE TEAM ROUND TOTAL ---------------- */
function computeTeamRoundTotal(playerIds, scores, roundNumber) {
    let total = 0;

    playerIds.forEach(pid => {
        const player = scores[String(pid)];
        if (!player) return;

        for (let h = 1; h <= 18; h++) {
            const key = `${roundNumber}-${h}`;
            const hole = player.holes[key];
            if (hole) {
                const delta = hole.strokes - hole.par;
                total += stableford(delta);
            }
        }
    });

    return total;
}

/* ---------------- BUILD ROUND TABLE ---------------- */
function buildRoundTable(playerIds, scores, roundNumber) {
    const wrapper = document.createElement("div");
    wrapper.className = "table-wrapper";

    const table = document.createElement("table");

    let html = "<tr><th>Player / Hole</th>";
    for (let h = 1; h <= 18; h++) html += `<th>${h}</th>`;
    html += "<th>Total</th></tr>";

    let teamTotals = Array(18).fill(0);
    let teamRoundTotal = 0;

    playerIds.forEach(pid => {
        const player = scores[String(pid)];
        if (!player) return;

        let row = `<tr><td class="player-name">${player.name}</td>`;
        let playerTotal = 0;

        for (let h = 1; h <= 18; h++) {
            const key = `${roundNumber}-${h}`;
            const hole = player.holes[key];

            if (hole) {
                const delta = hole.strokes - hole.par;
                const sf = stableford(delta);
                row += `<td>${sf}</td>`;
                playerTotal += sf;
                teamTotals[h - 1] += sf;
            } else {
                row += "<td>-</td>";
            }
        }

        row += `<td><strong>${playerTotal}</strong></td></tr>`;
        html += row;

        teamRoundTotal += playerTotal;
    });

    /* TEAM TOTAL ROW */
    let totalsRow = "<tr class='team-total-row'><td><strong>TEAM TOTAL</strong></td>";
    teamTotals.forEach(v => totalsRow += `<td>${v}</td>`);
    totalsRow += `<td><strong>${teamRoundTotal}</strong></td></tr>`;

    html += totalsRow;

    table.innerHTML = html;
    wrapper.appendChild(table);
    return wrapper;
}

/* ---------------- STABLEFORD ---------------- */
function stableford(delta) {
    if (delta <= -3) return 8;
    if (delta === -2) return 5;
    if (delta === -1) return 2;
    if (delta === 0) return 0;
    if (delta === 1) return -1;
    return -3;
}

/* ---------------- INIT ---------------- */
loadLastUpdated();
setInterval(loadLastUpdated, 60000);
loadData();
</script>

</body>
</html>
