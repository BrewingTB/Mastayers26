<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Masters Fantasy Leaderboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* TEAM ROW */
.team {
  background: #f5f5f5;
  border: 2px solid #1a4d2e;
  padding: 12px;
  margin-bottom: 10px;
  cursor: pointer;
  font-size: 20px;
  font-weight: 700;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ROUND ROW */
.round {
  background: #ffffff;
  border-left: 8px solid #1a4d2e; /* Masters green */
  border-right: 2px solid #1a4d2e;
  border-bottom: 2px solid #1a4d2e;
  padding: 10px 14px;
  margin: 6px 0;
  cursor: pointer;
  font-size: 18px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* COLLAPSIBLE CONTENT */
.collapsible {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.25s ease-out;
}

/* TABLE WRAPPER (responsive hybrid) */
.table-wrapper {
  overflow-x: auto;
  margin-top: 10px;
}

/* SCORE TABLE */
.score-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px; /* forces scroll on mobile */
}

.score-table th,
.score-table td {
  border: 1px solid #ccc;
  padding: 6px 8px;
  text-align: center;
  font-size: 14px;
}

.score-table th {
  background: #1a4d2e;
  color: white;
  font-weight: 700;
}

.player-name {
  font-weight: 700;
  background: #f0f0f0;
}

.team-total-row {
  background: #e8f5e9;
  font-weight: 700;
}
</style>
</head>

<body>

<h1 style="text-align:center; font-family:Arial; margin-bottom:20px;">
  Masters Fantasy Leaderboard
</h1>

<div id="leaderboard"></div>

<script>
async function loadLeaderboard() {
  const response = await fetch("data/fantasy.json");
  const data = await response.json();

  const leaderboard = document.getElementById("leaderboard");
  leaderboard.innerHTML = "";

  // Sort teams by total points
  const teams = Object.entries(data).sort((a, b) => b[1].total - a[1].total);

  teams.forEach(([teamName, teamData]) => {
    // TEAM ROW
    const teamDiv = document.createElement("div");
    teamDiv.className = "team";
    teamDiv.innerHTML = `
      <span>${teamName}</span>
      <span>${teamData.total}</span>
    `;

    // TEAM COLLAPSIBLE
    const teamContent = document.createElement("div");
    teamContent.className = "collapsible";

    // Build 4 round rows
    for (let r = 1; r <= 4; r++) {
      const roundTotal = teamData.rounds?.["R" + r]?.total ?? 0;

      const roundDiv = document.createElement("div");
      roundDiv.className = "round";
      roundDiv.innerHTML = `
        <span>Round ${r}</span>
        <span>${roundTotal}</span>
      `;

      const roundContent = document.createElement("div");
      roundContent.className = "collapsible";

      // Build table when round is clicked
      roundDiv.addEventListener("click", () => {
        if (roundContent.innerHTML.trim() === "") {
          roundContent.appendChild(
            buildRoundTable(teamData.players, teamData.rounds["R" + r])
          );
        }
        toggleSection(roundContent);
      });

      teamContent.appendChild(roundDiv);
      teamContent.appendChild(roundContent);
    }

    teamDiv.addEventListener("click", () => toggleSection(teamContent));

    leaderboard.appendChild(teamDiv);
    leaderboard.appendChild(teamContent);
  });
}

function toggleSection(section) {
  if (section.style.maxHeight) {
    section.style.maxHeight = null;
  } else {
    section.style.maxHeight = section.scrollHeight + "px";
  }
}

function buildRoundTable(players, roundData) {
  const wrapper = document.createElement("div");
  wrapper.className = "table-wrapper";

  const table = document.createElement("table");
  table.className = "score-table";

  const header = document.createElement("tr");
  header.innerHTML = `<th>Player / Hole</th>`;
  for (let h = 1; h <= 18; h++) header.innerHTML += `<th>${h}</th>`;
  header.innerHTML += `<th>Total</th>`;
  table.appendChild(header);

  // Player rows
  players.forEach(player => {
    const row = document.createElement("tr");
    row.innerHTML = `<td class="player-name">${player.name}</td>`;

    let total = 0;

    for (let h = 1; h <= 18; h++) {
      const score = roundData?.players?.[player.name]?.holes?.[h] ?? "";
      row.innerHTML += `<td>${score}</td>`;
      total += Number(score || 0);
    }

    row.innerHTML += `<td>${total}</td>`;
    table.appendChild(row);
  });

  // TEAM TOTAL ROW
  const teamRow = document.createElement("tr");
  teamRow.className = "team-total-row";
  teamRow.innerHTML = `<td>TEAM TOTAL</td>`;

  let teamTotal = 0;

  for (let h = 1; h <= 18; h++) {
    let holeTotal = 0;
    players.forEach(player => {
      holeTotal += Number(roundData?.players?.[player.name]?.holes?.[h] || 0);
    });
    teamRow.innerHTML += `<td>${holeTotal}</td>`;
    teamTotal += holeTotal;
  }

  teamRow.innerHTML += `<td>${teamTotal}</td>`;
  table.appendChild(teamRow);

  wrapper.appendChild(table);
  return wrapper;
}

loadLeaderboard();
</script>

</body>
</html>
