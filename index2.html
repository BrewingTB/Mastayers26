<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Masters Fantasy Leaderboard</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    .team {
        background: white;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid #ddd;
    }

    .team:hover {
        background: #f0f0f0;
    }

    .team-name {
        font-size: 20px;
        font-weight: bold;
    }

    .team-total {
        float: right;
        font-size: 20px;
        font-weight: bold;
    }

    .players {
        margin-top: 10px;
        padding-left: 20px;
        display: none;
    }

    .player {
        background: #fff;
        padding: 10px;
        margin: 6px 0;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid #ccc;
    }

    .player:hover {
        background: #f7f7f7;
    }

    .rounds {
        margin-top: 10px;
        padding-left: 20px;
        display: none;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 12px;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 6px;
        text-align: center;
    }

    th {
        background: #eee;
    }
</style>
</head>
<body>

<h1>Masters Fantasy Leaderboard</h1>
<div id="leaderboard"></div>

<script>
async function loadData() {
    const fantasyRes = await fetch("https://brewingtb.github.io/Mastayers26/data/fantasy.json");
    const fantasy = await fantasyRes.json();

    const scoresRes = await fetch("https://brewingtb.github.io/Mastayers26/data/scores.json");
    const scores = await scoresRes.json();

    const teamPlayersRes = await fetch("https://brewingtb.github.io/Mastayers26/data/team_players_fixed.json");
    const teamPlayers = await teamPlayersRes.json();

    renderLeaderboard(fantasy, scores, teamPlayers);
}

function renderLeaderboard(fantasy, scores, teamPlayers) {
    const container = document.getElementById("leaderboard");
    container.innerHTML = "";

    const teams = Object.entries(fantasy)
        .map(([teamName, data]) => ({
            teamName,
            total: data.total,
            rounds: data.rounds,
            roundTotals: data.roundTotals
        }))
        .sort((a, b) => b.total - a.total);

    teams.forEach(team => {
        const teamDiv = document.createElement("div");
        teamDiv.className = "team";
        teamDiv.innerHTML = `
            <span class="team-name">${team.teamName}</span>
            <span class="team-total">${team.total}</span>
        `;

        const playersDiv = document.createElement("div");
        playersDiv.className = "players";

        const playerIds = teamPlayers[team.teamName] || [];

        playerIds.forEach(pid => {
            const player = scores[String(pid)];
            if (!player) return;

            const playerDiv = document.createElement("div");
            playerDiv.className = "player";
            playerDiv.textContent = player.name;

            const roundsDiv = document.createElement("div");
            roundsDiv.className = "rounds";

            // Build clean scorecard-style tables
            for (let r = 1; r <= 4; r++) {
                const roundTable = document.createElement("table");

                // Header row: Round X + holes 1–18 + Total
                let headerRow = "<tr><th>Round " + r + "</th>";
                for (let h = 1; h <= 18; h++) {
                    headerRow += `<th>${h}</th>`;
                }
                headerRow += "<th>Total</th></tr>";

                // Score row
                let scoreRow = "<tr><td></td>";
                let roundTotal = 0;

                for (let h = 1; h <= 18; h++) {
                    const key = `${r}-${h}`;
                    const hole = player.holes[key];

                    if (hole) {
                        const delta = hole.strokes - hole.par;
                        const sf = stableford(delta);
                        roundTotal += sf;
                        scoreRow += `<td>${sf}</td>`;
                    } else {
                        scoreRow += "<td>-</td>";
                    }
                }

                scoreRow += `<td><strong>${roundTotal}</strong></td></tr>`;

                roundTable.innerHTML = headerRow + scoreRow;
                roundsDiv.appendChild(roundTable);
            }

            playerDiv.addEventListener("click", (e) => {
                e.stopPropagation();
                roundsDiv.style.display =
                    roundsDiv.style.display === "none" ? "block" : "none";
            });

            playersDiv.appendChild(playerDiv);
            playersDiv.appendChild(roundsDiv);
        });

        teamDiv.appendChild(playersDiv);

        teamDiv.addEventListener("click", () => {
            playersDiv.style.display =
                playersDiv.style.display === "none" ? "block" : "none";
        });

        container.appendChild(teamDiv);
    });
}

function stableford(delta) {
    if (delta <= -3) return 8;
    if (delta === -2) return 5;
    if (delta === -1) return 2;
    if (delta === 0) return 0;
    if (delta === 1) return -1;
    return -3;
}

loadData();
</script>

</body>
</html>
