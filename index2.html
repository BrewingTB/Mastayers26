<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Masters Fantasy Leaderboard</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    .team {
        background: white;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid #ddd;
    }

    .team:hover {
        background: #f0f0f0;
    }

    .team-name {
        font-size: 20px;
        font-weight: bold;
    }

    .team-total {
        float: right;
        font-size: 20px;
        font-weight: bold;
    }

    .players {
        margin-top: 10px;
        padding-left: 20px;
        display: none;
    }

    .player {
        background: #fff;
        padding: 10px;
        margin: 6px 0;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid #ccc;
    }

    .player:hover {
        background: #f7f7f7;
    }

    .rounds {
        margin-top: 10px;
        padding-left: 20px;
        display: none;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 12px;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 6px;
        text-align: center;
    }

    th {
        background: #eee;
    }
</style>
</head>
<body>

<h1>Masters Fantasy Leaderboard</h1>
<div id="leaderboard"></div>

<script>
async function loadData() {
    const fantasyRes = await fetch("data/fantasy.json");
    const fantasy = await fantasyRes.json();

    const scoresRes = await fetch("data/scores.json");
    const scores = await scoresRes.json();

    renderLeaderboard(fantasy, scores);
}

function renderLeaderboard(fantasy, scores) {
    const container = document.getElementById("leaderboard");
    container.innerHTML = "";

    // Convert to sortable array
    const teams = Object.entries(fantasy)
        .map(([teamName, data]) => ({
            teamName,
            total: data.total,
            rounds: data.rounds,
            roundTotals: data.roundTotals
        }))
        .sort((a, b) => b.total - a.total);

    teams.forEach(team => {
        const teamDiv = document.createElement("div");
        teamDiv.className = "team";
        teamDiv.innerHTML = `
            <span class="team-name">${team.teamName}</span>
            <span class="team-total">${team.total}</span>
        `;

        const playersDiv = document.createElement("div");
        playersDiv.className = "players";

        // Load players from team_players_fixed.json (already in fantasy.json structure)
        const playerIds = Object.keys(scores).filter(pid =>
            scores[pid].team === team.teamName
        );

        playerIds.forEach(pid => {
            const player = scores[pid];

            const playerDiv = document.createElement("div");
            playerDiv.className = "player";
            playerDiv.textContent = player.name;

            const roundsDiv = document.createElement("div");
            roundsDiv.className = "rounds";

            // Build round tables
            for (let r = 1; r <= 4; r++) {
                const roundTable = document.createElement("table");

                let header = "<tr><th colspan='20'>Round " + r + "</th></tr>";
                let holeHeader = "<tr><th>Hole</th>";
                let scoreRow = "<tr><td>Score</td>";

                for (let h = 1; h <= 18; h++) {
                    holeHeader += `<th>${h}</th>`;

                    const key = `${r}-${h}`;
                    const hole = player.holes[key];

                    if (hole) {
                        const delta = hole.strokes - hole.par;
                        const sf = stableford(delta);
                        scoreRow += `<td>${sf}</td>`;
                    } else {
                        scoreRow += "<td>-</td>";
                    }
                }

                holeHeader += "</tr>";
                scoreRow += "</tr>";

                roundTable.innerHTML = header + holeHeader + scoreRow;
                roundsDiv.appendChild(roundTable);
            }

            playerDiv.addEventListener("click", () => {
                roundsDiv.style.display =
                    roundsDiv.style.display === "none" ? "block" : "none";
            });

            playersDiv.appendChild(playerDiv);
            playersDiv.appendChild(roundsDiv);
        });

        teamDiv.addEventListener("click", () => {
            playersDiv.style.display =
                playersDiv.style.display === "none" ? "block" : "none";
        });

        container.appendChild(teamDiv);
        container.appendChild(playersDiv);
    });
}

// Stableford scoring for UI
function stableford(delta) {
    if (delta <= -3) return 8;
    if (delta === -2) return 5;
    if (delta === -1) return 2;
    if (delta === 0) return 0;
    if (delta === 1) return -1;
    return -3;
}

loadData();
</script>

</body>
</html>

</body>
</html>
