<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Masters Fantasy Leaderboard</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 5px;
    }

    #lastUpdated {
        text-align: center;
        font-style: italic;
        color: #555;
        margin-bottom: 20px;
    }

    .team {
        background: white;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid #ddd;
    }

    .team:hover {
        background: #f0f0f0;
    }

    .team-name {
        font-size: 22px;
        font-weight: 700;
        cursor: pointer;
    }

    .team-total {
        float: right;
        font-size: 20px;
        font-weight: bold;
    }

    .players {
        margin-top: 10px;
        padding-left: 20px;
        display: none;
    }

    .player {
        background: #fff;
        padding: 10px;
        margin: 6px 0;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid #ccc;
        font-size: 18px;
        font-weight: 600;
        transition: color 0.2s ease, transform 0.15s ease;
    }

    .player:hover,
    .team-name:hover {
        color: #0b6623;
        transform: translateX(4px);
        text-decoration: underline;
    }

    .player-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .player-total {
        font-weight: 700;
        color: #0b6623;
    }

    .rounds {
        margin-top: 10px;
        padding-left: 20px;
        display: none;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 12px;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 6px;
        text-align: center;
    }

    th {
        background: #eee;
    }

    .arrow {
        display: inline-block;
        transition: transform 0.2s ease;
        margin-right: 6px;
        font-size: 14px;
    }

    .expanded {
        transform: rotate(90deg);
    }
</style>
</head>
<body>

<h1>Masters Fantasy Leaderboard</h1>
<p id="lastUpdated"></p>

<div id="leaderboard"></div>

<script>
async function loadLastUpdated() {
    const res = await fetch(
        "https://api.github.com/repos/brewingtb/Mastayers26/commits?path=data/fantasy.json"
    );
    const commits = await res.json();

    if (commits.length > 0) {
        const timestamp = commits[0].commit.committer.date;
        const date = new Date(timestamp);

        document.getElementById("lastUpdated").textContent =
            "Last updated: " +
            date.toLocaleString("en-US", {
                weekday: "short",
                month: "short",
                day: "numeric",
                hour: "numeric",
                minute: "2-digit",
                hour12: true
            });
    }
}

async function loadData() {
    const fantasyRes = await fetch("https://brewingtb.github.io/Mastayers26/data/fantasy.json");
    const fantasy = await fantasyRes.json();

    const scoresRes = await fetch("https://brewingtb.github.io/Mastayers26/data/scores.json");
    const scores = await scoresRes.json();

    const teamPlayersRes = await fetch("https://brewingtb.github.io/Mastayers26/data/team_players_fixed.json");
    const teamPlayers = await teamPlayersRes.json();

    renderLeaderboard(fantasy, scores, teamPlayers);
}

function renderLeaderboard(fantasy, scores, teamPlayers) {
    const container = document.getElementById("leaderboard");
    container.innerHTML = "";

    const teams = Object.entries(fantasy)
        .map(([teamName, data]) => ({
            teamName,
            total: data.total,
            rounds: data.rounds,
            roundTotals: data.roundTotals
        }))
        .sort((a, b) => b.total - a.total);

    teams.forEach(team => {
        const teamDiv = document.createElement("div");
        teamDiv.className = "team";
        teamDiv.innerHTML = `
            <span class="team-name">
                <span class="arrow">▶</span> ${team.teamName}
            </span>
            <span class="team-total">${team.total}</span>
        `;

        const playersDiv = document.createElement("div");
        playersDiv.className = "players";

        const playerIds = teamPlayers[team.teamName] || [];

        playerIds.forEach(pid => {
            const player = scores[String(pid)];
            if (!player) return;

            // Calculate player's total Stableford score
            let playerTotal = 0;
            for (let r = 1; r <= 4; r++) {
                for (let h = 1; h <= 18; h++) {
                    const key = `${r}-${h}`;
                    const hole = player.holes[key];
                    if (hole) {
                        const delta = hole.strokes - hole.par;
                        playerTotal += stableford(delta);
                    }
                }
            }

            const playerDiv = document.createElement("div");
            playerDiv.className = "player";
            playerDiv.innerHTML = `
                <div class="player-row">
                    <span class="arrow">▶</span>
                    <span class="player-name-text">${player.name}</span>
                    <span class="player-total">${playerTotal} pts</span>
                </div>
            `;

            const roundsDiv = document.createElement("div");
            roundsDiv.className = "rounds";

            // One unified scorecard table per player
            const table = document.createElement("table");

            // Holes header row
            let headerRow = "<tr><th>Hole</th>";
            for (let h = 1; h <= 18; h++) {
                headerRow += `<th>${h}</th>`;
            }
            headerRow += "<th>Total</th></tr>";

            let tableHTML = headerRow;

            // 4 round rows
            let columnTotals = Array(18).fill(0);
            let grandTotal = 0;

            for (let r = 1; r <= 4; r++) {
                let row = `<tr><td>Round ${r}</td>`;
                let roundTotal = 0;

                for (let h = 1; h <= 18; h++) {
                    const key = `${r}-${h}`;
                    const hole = player.holes[key];

                    if (hole) {
                        const delta = hole.strokes - hole.par;
                        const sf = stableford(delta);
                        roundTotal += sf;
                        columnTotals[h - 1] += sf;
                        row += `<td>${sf}</td>`;
                    } else {
                        row += "<td>-</td>";
                    }
                }

                grandTotal += roundTotal;
                row += `<td><strong>${roundTotal}</strong></td></tr>`;
                tableHTML += row;
            }

            // Totals row
            let totalsRow = "<tr><td><strong>Totals</strong></td>";
            for (let i = 0; i < 18; i++) {
                totalsRow += `<td><strong>${columnTotals[i]}</strong></td>`;
            }
            totalsRow += `<td><strong>${grandTotal}</strong></td></tr>`;

            tableHTML += totalsRow;

            table.innerHTML = tableHTML;
            roundsDiv.appendChild(table);

            playerDiv.addEventListener("click", (e) => {
                e.stopPropagation();
                const isOpen = roundsDiv.style.display === "block";
                roundsDiv.style.display = isOpen ? "none" : "block";

                const arrow = playerDiv.querySelector(".arrow");
                if (arrow) {
                    if (isOpen) arrow.classList.remove("expanded");
                    else arrow.classList.add("expanded");
                }
            });

            playersDiv.appendChild(playerDiv);
            playersDiv.appendChild(roundsDiv);
        });

        teamDiv.appendChild(playersDiv);

        teamDiv.addEventListener("click", () => {
            const isOpen = playersDiv.style.display === "block";
            playersDiv.style.display = isOpen ? "none" : "block";

            const arrow = teamDiv.querySelector(".team-name .arrow");
            if (arrow) {
                if (isOpen) arrow.classList.remove("expanded");
                else arrow.classList.add("expanded");
            }
        });

        container.appendChild(teamDiv);
    });
}

function stableford(delta) {
    if (delta <= -3) return 8;
    if (delta === -2) return 5;
    if (delta === -1) return 2;
    if (delta === 0) return 0;
    if (delta === 1) return -1;
    return -3;
}

loadLastUpdated();
setInterval(loadLastUpdated, 60000);

loadData();
</script>

</body>
</html>
