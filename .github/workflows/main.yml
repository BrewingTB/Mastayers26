name: Pull Masters Data
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4 # Use v4
      - name: Setup Node.js
        uses: actions/setup-node@v4 # Use v4
        with:
          node-version: '20'
      - name: Run fetch
        run: node update_scores.js
        env:
          GOLF_API_KEY: ${{ secrets.GOLF_API_KEY }}
      - name: Commit
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add data.json
          git commit -m "update data" || exit 0
          git push
