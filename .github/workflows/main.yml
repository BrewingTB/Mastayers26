name: Pull Masters Data
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GOLF_API_KEY: ${{ secrets.GOLF_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Pull Rankings
        run: node scripts/rankings.js
  
      - name: Pull player profiles
        run: node scripts/pullplayers.js

      - name: Pull Masters Field
        run: node scripts/pullmastersfield.js

      - name: Run Fetch Script
        run: node update_scores.js

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add data.json data/players.json
          git add data.json data/masters_players.json
          git commit -m "Update scores" || exit 0
          git push
